<!-- 404.html: GitHub Pages serves this for unknown routes -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <meta http-equiv="refresh" content="0; url=https://www.danifernandezs.com/">
  <meta name="robots" content="noindex,follow">
  <link rel="canonical" href="https://www.danifernandezs.com/">
  <script>
    // Preserve path/query/hash; replace() avoids back button
    var dest = "https://www.danifernandezs.com" +
      window.location.pathname + window.location.search + window.location.hash;
    window.location.replace(dest);
  </script>
</head>
<body>
  <noscript>
    <meta http-equiv="refresh" content="0; url=https://www.danifernandezs.com/">
    <a href="https://www.danifernandezs.com/">Go to danifernandezs.com</a>
  </noscript>
</body>
</html>
